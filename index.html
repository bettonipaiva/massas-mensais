<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Massas Mensais</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --color-plastico: #ef4444; /* Vermelho */
            --color-papel: #3b82f6;    /* Azul */
            --color-vidro: #10b981;    /* Verde */
            --color-metal: #eab308;    /* Amarelo */
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; color: #1e293b; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; margin-bottom: 20px; text-align: center; color: #0f172a; }
        
        .chart-container { position: relative; height: 400px; margin-bottom: 40px; }
        
        .table-wrapper { overflow-x: auto; margin-top: 20px; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; text-transform: uppercase; font-size: 11px; }
        td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; text-align: right; }
        td:first-child { text-align: left; font-weight: bold; }

        .text-plastico { color: var(--color-plastico); font-weight: bold; }
        .text-papel { color: var(--color-papel); font-weight: bold; }
        .text-vidro { color: var(--color-vidro); font-weight: bold; }
        .text-metal { color: var(--color-metal); font-weight: bold; }
        
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { padding: 15px; border-radius: 8px; border-left: 4px solid #cbd5e1; background: #f8fafc; }
        .card.plastico { border-left-color: var(--color-plastico); }
        .card.papel { border-left-color: var(--color-papel); }
        .card.vidro { border-left-color: var(--color-vidro); }
        .card.metal { border-left-color: var(--color-metal); }
        .card-label { font-size: 11px; text-transform: uppercase; color: #64748b; }
        .card-value { font-size: 18px; font-weight: bold; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>Relatório Consolidado de Resíduos (2025-2026)</h1>

    <div class="summary-cards">
        <div class="card plastico"><span class="card-label">Plástico</span><span class="card-value text-plastico">8,495 t</span></div>
        <div class="card papel"><span class="card-label">Papel</span><span class="card-value text-papel">10,248 t</span></div>
        <div class="card vidro"><span class="card-label">Vidro</span><span class="card-value text-vidro">1,514 t</span></div>
        <div class="card metal"><span class="card-label">Metal</span><span class="card-value text-metal">735 t</span></div>
    </div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <div class="table-wrapper">
        <table id="data-table">
            <thead>
                <tr>
                    <th>Mês/Ano</th>
                    <th style="color:var(--color-plastico)">Plástico (t)</th>
                    <th style="color:var(--color-papel)">Papel (t)</th>
                    <th style="color:var(--color-vidro)">Vidro (t)</th>
                    <th style="color:var(--color-metal)">Metal (t)</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    const data = [
        {p: "Jan/25", pl: 761.038, pa: 394.903, vi: 71.050, me: 11.101},
        {p: "Fev/25", pl: 195.117, pa: 174.299, vi: 27.194, me: 26.452},
        {p: "Mar/25", pl: 534.363, pa: 244.486, vi: 33.250, me: 16.180},
        {p: "Abr/25", pl: 403.436, pa: 368.426, vi: 85.642, me: 32.017},
        {p: "Mai/25", pl: 619.149, pa: 507.119, vi: 35.283, me: 55.191},
        {p: "Jun/25", pl: 1190.217, pa: 958.709, vi: 349.823, me: 63.458},
        {p: "Jul/25", pl: 675.291, pa: 814.244, vi: 211.134, me: 77.279},
        {p: "Ago/25", pl: 499.008, pa: 706.041, vi: 161.971, me: 63.171},
        {p: "Set/25", pl: 838.028, pa: 1233.387, vi: 133.381, me: 91.679},
        {p: "Out/25", pl: 563.498, pa: 1109.977, vi: 91.470, me: 68.783},
        {p: "Nov/25", pl: 787.928, pa: 1750.376, vi: 122.567, me: 98.189},
        {p: "Dez/25", pl: 717.049, pa: 1300.745, vi: 165.733, me: 102.516},
        {p: "Jan/26", pl: 366.996, pa: 1053.484, vi: 49.879, me: 79.601},
        {p: "Fev/26", pl: 923.608, pa: 1159.783, vi: 109.880, me: 89.733}
    ];

    // Preencher Tabela
    const tbody = document.querySelector('#data-table tbody');
    data.forEach(item => {
        const total = (item.pl + item.pa + item.vi + item.me).toFixed(3);
        const row = `<tr>
            <td>${item.p}</td>
            <td class="text-plastico">${item.pl.toFixed(3)}</td>
            <td class="text-papel">${item.pa.toFixed(3)}</td>
            <td class="text-vidro">${item.vi.toFixed(3)}</td>
            <td class="text-metal">${item.me.toFixed(3)}</td>
            <td style="font-weight:bold">${total}</td>
        </tr>`;
        tbody.innerHTML += row;
    });

    // Gerar Gráfico
    const ctx = document.getElementById('myChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: data.map(d => d.p),
            datasets: [
                { label: 'Plástico', data: data.map(d => d.pl), backgroundColor: '#ef4444' },
                { label: 'Papel', data: data.map(d => d.pa), backgroundColor: '#3b82f6' },
                { label: 'Vidro', data: data.map(d => d.vi), backgroundColor: '#10b981' },
                { label: 'Metal', data: data.map(d => d.me), backgroundColor: '#eab308' }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: true, stacked: true, title: { display: true, text: 'Toneladas (t)' } },
                x: { stacked: true }
            },
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
</script>

</body>
</html>
