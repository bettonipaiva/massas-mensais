<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Resíduos - Consolidado</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --color-plastico: #ef4444; --color-papel: #3b82f6;
            --color-vidro: #10b981; --color-metal: #eab308;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; color: #1e293b; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; color: #0f172a; margin-bottom: 5px; }
        .subtitle { color: #64748b; font-size: 14px; margin-bottom: 25px; }

        .state-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin: 20px 0; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .state-card { text-align: center; border-right: 1px solid #e2e8f0; padding: 0 10px; }
        .state-card:last-child { border-right: none; }
        .state-card h3 { font-size: 11px; text-transform: uppercase; color: #64748b; margin: 0 0 5px 0; }
        .state-card p { font-size: 18px; font-weight: bold; margin: 0; }

        .main-content { display: grid; grid-template-columns: 1fr 350px; gap: 25px; margin-top: 20px; }
        .chart-container { height: 300px; position: relative; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { background: #f8fafc; text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; color: #64748b; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .text-plastico { color: var(--color-plastico); font-weight: 600; }
        .text-papel { color: var(--color-papel); font-weight: 600; }
        .text-vidro { color: var(--color-vidro); font-weight: 600; }
        .text-metal { color: var(--color-metal); font-weight: 600; }
        .badge-cnpj { font-size: 10px; color: #94a3b8; display: block; }
        .excluded { opacity: 0.4; text-decoration: line-through; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dashboard de Massas Adquiridas</h1>
    <p class="subtitle">Base de Dados: massas_consolidadas.csv (Janeiro - Abril 2025)</p>

    <div class="state-summary">
        <div class="state-card"><h3>Plástico</h3><p id="avg-pl" class="text-plastico">0 t</p></div>
        <div class="state-card"><h3>Papel</h3><p id="avg-pa" class="text-papel">0 t</p></div>
        <div class="state-card"><h3>Vidro</h3><p id="avg-vi" class="text-vidro">0 t</p></div>
        <div class="state-card"><h3>Metal</h3><p id="avg-me" class="text-metal">0 t</p></div>
        <div class="state-card"><h3>Total Consolidado</h3><p id="avg-total">0 t</p></div>
    </div>

    <div class="main-content">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th></th>
                        <th>Operador</th>
                        <th>Plástico (t)</th>
                        <th>Papel (t)</th>
                        <th>Vidro (t)</th>
                        <th>Metal (t)</th>
                        <th>Total (t)</th>
                    </tr>
                </thead>
                <tbody id="operators-body"></tbody>
            </table>
        </div>
        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
</div>

<script>
    // Dados processados diretamente do arquivo massas_consolidadas.csv [cite: 1, 3, 4]
    const rawData = [
        { op: "INSTITUTO RECICLAR AM", cnpj: "14554344000157.0", pl: 49.28, pa: 0, vi: 0, me: 0 },
        { op: "ASSOC. IBIPITANGA BA", cnpj: "33544437000145.0", pl: 0, pa: 0, vi: 0, me: 0 },
        { op: "COOP. RESIDUOS SOLIDOS BA", cnpj: "8864519000120.0", pl: 50.14, pa: 0, vi: 0, me: 0 },
        { op: "ASSOC. CATADORES GUARAPARI ES", cnpj: "4021818000141.0", pl: 2.85, pa: 15.75, vi: 0, me: 0.21 },
        { op: "ASSOC. VARZEA MT", cnpj: "10921355000177.0", pl: 42, pa: 50.5, vi: 10, me: 0 },
        { op: "COOPEMBAU RJ", cnpj: "23189494000108.0", pl: 59.80, pa: 55.75, vi: 0, me: 0 },
        { op: "ASSOC. CATADORES CHOCOLATAO RS", cnpj: "13140540000112.0", pl: 8.33, pa: 12.16, vi: 0, me: 0.43 },
        { op: "CCMRO SP", cnpj: "11472760000118.0", pl: 5.8, pa: 15.54, vi: 0, me: 3.32 },
        { op: "COOPERELO SC", cnpj: "52135033000142.0", pl: 87, pa: 0, vi: 0, me: 0 }
    ];

    let operadores = rawData.map(item => ({
        nome: item.op,
        cnpj: item.cnpj,
        media: { pl: item.pl, pa: item.pa, vi: item.vi, me: item.me },
        included: true
    }));

    function updateDashboard() {
        const tbody = document.getElementById('operators-body');
        tbody.innerHTML = '';
        let totals = { pl: 0, pa: 0, vi: 0, me: 0 };

        operadores.forEach((op, i) => {
            const rowSum = op.media.pl + op.media.pa + op.media.vi + op.media.me;
            if (op.included) {
                totals.pl += op.media.pl;
                totals.pa += op.media.pa;
                totals.vi += op.media.vi;
                totals.me += op.media.me;
            }

            const tr = document.createElement('tr');
            if(!op.included) tr.className = 'excluded';
            tr.innerHTML = `
                <td><input type="checkbox" ${op.included?'checked':''} onchange="toggle(${i})"></td>
                <td><b>${op.nome}</b><span class="badge-cnpj">CNPJ: ${op.cnpj}</span></td>
                <td class="text-plastico">${op.media.pl.toFixed(2)}</td>
                <td class="text-papel">${op.media.pa.toFixed(2)}</td>
                <td class="text-vidro">${op.media.vi.toFixed(2)}</td>
                <td class="text-metal">${op.media.me.toFixed(2)}</td>
                <td style="font-weight:bold; background:#f8fafc">${rowSum.toFixed(2)}</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('avg-pl').innerText = totals.pl.toFixed(2) + ' t';
        document.getElementById('avg-pa').innerText = totals.pa.toFixed(2) + ' t';
        document.getElementById('avg-vi').innerText = totals.vi.toFixed(2) + ' t';
        document.getElementById('avg-me').innerText = totals.me.toFixed(2) + ' t';
        document.getElementById('avg-total').innerText = (totals.pl + totals.pa + totals.vi + totals.me).toFixed(2) + ' t';

        updateChart(totals);
    }

    function toggle(index) {
        operadores[index].included = !operadores[index].included;
        updateDashboard();
    }

    let myChart;
    function updateChart(totals) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Plástico', 'Papel', 'Vidro', 'Metal'],
                datasets: [{
                    data: [totals.pl, totals.pa, totals.vi, totals.me],
                    backgroundColor: ['#ef4444', '#3b82f6', '#10b981', '#eab308']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    window.onload = updateDashboard;
</script>
</body>
</html>
